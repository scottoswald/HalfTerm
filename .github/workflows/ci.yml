# GitHub Actions CI/CD Pipeline
# This workflow runs automatically on every push to main
# It runs all tests and if they pass, triggers a Railway deployment

name: CI/CD Pipeline

# Define when this workflow runs
on:
  push:
    # Only run when pushing to the main branch
    branches: [main]
  pull_request:
    # Also run on pull requests to main
    # This catches issues before they're merged
    branches: [main]

jobs:

  # ---- BACKEND TESTS ----
  backend-tests:
    # Run on the latest Ubuntu Linux runner
    # GitHub provides these virtual machines for free
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Python 3.11 to match our local environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3 — Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 — Run pytest with verbose output
      # The environment variables are needed for the agent to initialise
      # We use dummy values since tests mock the actual API calls
      - name: Run backend tests
        working-directory: ./backend
        env:
          ANTHROPIC_API_KEY: dummy-key-for-testing
          TICKETMASTER_API_KEY: dummy-key-for-testing
          GOOGLE_PLACES_API_KEY: dummy-key-for-testing
        run: python -m pytest tests/ -v

  # ---- FRONTEND TESTS ----
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Node.js 22 to match our local environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Cache npm dependencies to speed up future runs
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Step 3 — Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # Step 4 — Run Vitest
      - name: Run frontend tests
        working-directory: ./frontend
        run: npx vitest run

  # ---- DEPLOY ----
  # This job only runs after both test jobs pass
  # and only on pushes to main (not pull requests)
  deploy:
    runs-on: ubuntu-latest
    # needs means this job waits for both test jobs to complete successfully
    needs: [backend-tests, frontend-tests]
    # Only deploy on push to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1 — Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Trigger Railway deployment
      # Railway watches our GitHub repo and deploys automatically on push
      # So we just need to confirm the push happened after tests passed
      - name: Notify deployment
        run: echo "Tests passed — Railway will auto-deploy from GitHub push"