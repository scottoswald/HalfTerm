server {
    # Listen on port 80 — the standard HTTP port
    # nginx serves on port 80 by default inside the container
    listen 80;

    # Serve files from this directory
    # This is where our built React files are copied during the Docker build
    root /usr/share/nginx/html;
    
    # Default file to serve when someone visits the root URL
    index index.html;

    # ---- API REVERSE PROXY ----
    # When the browser calls /api/search, nginx forwards it to the backend
    # In Docker Compose, containers find each other by service name (e.g. "backend")
    # In AWS ECS, containers run independently so we use the backend's public IP
    # Note: if the backend IP changes you'll need to rebuild and redeploy the frontend
    location /api/ {
        # Strip the /api prefix before forwarding
        # So /api/search becomes /search on the backend
        rewrite ^/api/(.*) /$1 break;

        # Forward to the backend container's public IP and port
        proxy_pass http://16.60.157.219:8000;

        # Pass the original host header so the backend knows where the request came from
        proxy_set_header Host $host;

        # Pass the real client IP address to the backend
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- REACT ROUTER SUPPORT ----
    # This is critical for React Router to work correctly
    # Without it, refreshing on /results would return a 404
    # try_files attempts to find the file, then falls back to index.html
    # React Router then handles the routing on the client side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- STATIC ASSET CACHING ----
    # Cache JS, CSS and image files for 1 year
    # These files have content hashed names so caching is safe
    # The browser won't re-download them unless the filename changes
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}