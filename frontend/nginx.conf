server {
    # Listen on port 80
    listen 80;

    # Serve files from this directory
    root /usr/share/nginx/html;
    
    # Default file to serve
    index index.html;

    # Reverse proxy for API calls
    # When the browser calls /api/search, nginx forwards it to the backend container
    # The browser never needs to know about the backend hostname
    # proxy_pass uses the Docker service name 'backend' which is valid inside Docker network
    location /api/ {
        # Strip /api prefix and forward to backend
        # So /api/search becomes /search on the backend
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # This is critical for React Router to work correctly
    # Without it, refreshing on /results would return a 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, images) for 1 year
    # These files have hashed names so caching is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}